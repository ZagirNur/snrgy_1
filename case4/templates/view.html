{% extends "base.html" %}
{% block content %}
<h2>{{ tour.title }}</h2>
<p>Страна: {{ tour.country }}</p>
<p>Цена: {{ tour.price }} руб.</p>
<p>{{ tour.description }}</p>
<form method="post" action="/{{ tour.id }}/delete">
<button type="submit">Удалить</button>
</form>
<p><a href="/">Назад</a></p>
{% endblock %}
