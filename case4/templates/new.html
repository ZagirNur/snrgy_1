{% extends "base.html" %}
{% block content %}
<h2>Новый тур</h2>
<form method="post">
<p>Название:<br><input name="title" required></p>
<p>Страна:<br><input name="country" required></p>
<p>Цена:<br><input name="price" type="number" step="0.01" required></p>
<p>Описание:<br><textarea name="description"></textarea></p>
<p><button type="submit">Сохранить</button></p>
</form>
{% endblock %}
